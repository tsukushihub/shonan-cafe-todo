<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tsukushi's todo</title>
    <!-- スマホ・アプリアイコン＆PWA設定 -->
    <link rel="icon" type="image/png" href="icon.png?v=2">
    <link rel="apple-touch-icon" href="icon.png?v=2">
    <link rel="manifest" href="manifest.json?v=2">
    <meta name="theme-color" content="#87CDE0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Todo">
    <!-- 丸みがあって可愛いフォントを読み込みます -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- 素敵なアイコンフォント (Google Material Symbols) -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ocean-background">
        <!-- 波のアニメーション用 -->
        <div class="wave wave1"></div>
        <div class="wave wave2"></div>
    </div>

    <!-- 湘南サーフアイテムの装飾 -->
    <div class="surf-decoration">
        <svg viewBox="0 0 100 400" xmlns="http://www.w3.org/2000/svg">
            <path d="M50,10 C20,80 10,200 10,350 C10,380 40,390 50,390 C60,390 90,380 90,350 C90,200 80,80 50,10 Z" fill="#F9A875" />
            <path d="M50,10 L50,390" stroke="white" stroke-width="4" />
            <path d="M10,250 L90,250" stroke="#87CDE0" stroke-width="12" />
            <path d="M10,270 L90,270" stroke="#4A8C9E" stroke-width="6" />
            <circle cx="50" cy="100" r="16" fill="#87CDE0" />
            <circle cx="50" cy="100" r="11" fill="white" />
        </svg>
    </div>

    <div class="app-container">
        <header>
            <h1><span class="material-symbols-rounded logo-icon">surfing</span> tsukushi's todo</h1>
            <p class="subtitle">波に乗るように、今日のタスクをクリア。</p>
        </header>

        <main>
            <div class="input-section">
                <input type="text" id="todo-input" placeholder="次は何をする？">
                <button id="add-button" class="add-btn">
                    <span class="material-symbols-rounded">add</span>
                </button>
            </div>

            <div class="todo-list-container">
                <ul id="todo-list" class="todo-list">
                    <!-- JavaScriptでタスクがここに追加されます -->
                </ul>
                <div class="empty-state" id="empty-state">
                    <span class="material-symbols-rounded empty-icon">sailing</span>
                    <p>今はタスクがありません。<br>海風を感じてリラックスしましょう🌊</p>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
